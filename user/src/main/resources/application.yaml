spring:
  datasource:
    url: jdbc:h2:file:./data/mindweather;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8080

# DeepSeek API 配置（投稿情绪分析用）
mindweather:
  ai:
    provider: deepseek
    api-key: ${DEEPSEEK_API_KEY:your-api-key-here}
    api-url: https://api.deepseek.com/v1/chat/completions
    model: deepseek-chat
